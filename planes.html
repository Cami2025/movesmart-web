<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Plan - MoveSmart</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0b0b0b;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.dia{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.dia h2{
  color:#ff5a1f;
}

.ejercicio{
  margin-top:10px;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.ejercicio:last-child{
  border-bottom:none;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#ff5a1f;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h1>Tu Plan Personalizado</h1>

<div class="dia">
  <h2>Día 1 - Tren Inferior</h2>

  <div class="ejercicio">Sentadilla – 3x10</div>
  <div class="ejercicio">Puente glúteo – 3x12</div>
  <div class="ejercicio">Peso muerto – 3x10</div>
</div>

<div class="dia">
  <h2>Día 2 - Core</h2>

  <div class="ejercicio">Plancha – 3x30 seg</div>
  <div class="ejercicio">Dead bug – 3x10</div>
</div>

<button>Marcar como completado</button>

</div>

</body>
</html>
